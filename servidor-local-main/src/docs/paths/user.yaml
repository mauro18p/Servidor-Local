# paths/user.yaml kk
paths:
  /user:
    get:
      summary: Listar todos os Useres
      tags:
        - User
      description: Retorna uma lista de todos os Useres disponíveis
      responses:
        "200":
          description: Lista de Useres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "404":
          description: "Nenhum User encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /user/create:
    post:
      summary: Criar um novo User
      tags:
        - User
      description: Cria um novo User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "200":
          description: User criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Erro ao criar User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /user/get-by-id/{id}:
    get:
      summary: Buscar um User por ID
      tags:
        - User
      description: Retorna um User especificado pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do User
          schema:
            type: string
            example: 4f4662d3-27fc-4e29-ac53-1a9ecf73e69e
      responses:
        "200":
          description: User encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: User nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
  /user/update/{id}:
    put:
      summary: Actualizar um utiliazdor por ID
      tags:
        - User
      description: Actualiza um User especificado pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do User
          schema:
            type: string
            example: 4f4662d3-27fc-4e29-ac53-1a9ecf73e69e
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $href: "#/components/schemas/CreateUser" #tem mesma informacao de CreateUser
      responses:
        "200":
          description: User actualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Dados invalidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
        "404":
          description: User nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
  /user/delete/{id}:
    delete:
      summary: Apaga um User
      tags:
        - User
      description: Apaga um User especificado pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do User
          schema:
            type: integer
            example: 4f4662d3-27fc-4e29-ac53-1a9ecf73e69e
      responses:
        "200":
          description: User apagado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: User nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
  /user/login:
    post:
      summary: Login de um User
      tags:
        - User
      description: Faz login do Useres
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginUser"
      responses:
        "200":
          description: User apagado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: User nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"
        "400":
          description: Erro ao logar User
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"

    