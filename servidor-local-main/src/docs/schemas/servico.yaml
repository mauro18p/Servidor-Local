#schema/servico.yaml

components:
  schemas:
    Service:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Serviço de Limpeza"
        descricao:
          type: string
          example: "Serviço de limpeza profissional para residências e "
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          example: "2010-12-10T00:00:00.000Z"
        updated_at:
            typr: string
            example: "2010-12-10T00:00.000Z"
  
    CreateService:
      type: object
      properties:
        nome:
          type: string
          example: "Servico de limpeza"
        descricao:
          type: string
          example: "Servico de limpeza profissional para residencia e empresa"
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: boolean
          example: true
      required:
        - nome
        - descricao
        - categoria
        - enabled

    ServicoDetalhado:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Serviço de Limpeza"
        descricao:
          type: string
          example: "Serviço de limpeza profissional para residências e "
        designacao_categoria:
          type: string
          example: "Limpeza"
        icone_categoria:
          type: string
          example: ""
        id_cempresa:
          type: string
          example: 1
        designacao_empresa:
          type: string
          example: "empresa de limpeza"
        icone_empresa:
          type: string
          example: ""
        enabled:
          type: string
          example: true
        
    #Schema generico para sucesso
    ResponseSucess:
      ttpe: object
      propreties:
        message:
          type: string
          example: "Servico criado com sucesso"
        status:
          type: boolean
          example: true

    #servico generico de resposta de erro
    ResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar serviços"
        status:
          type: boolean
          example: false
        data:
          type: object

